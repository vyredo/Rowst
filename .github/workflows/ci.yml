name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  bundle-check:
    name: Verify zero runtime dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check for runtime dependencies
        run: |
          if grep -r "require(" dist/*.cjs dist/*.js 2>/dev/null | grep -v "require(\"node:" | grep -v "require('./" | grep -v "require(\"./"; then
            echo "ERROR: Runtime dependencies detected in bundle!"
            exit 1
          fi
          echo "Verified: zero runtime dependencies."
